<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmony Hub</title>
    <!-- VitePWA plugin automatically injects manifest and service worker -->
    <meta
      name="description"
      content="Harmony Hub - Stream, discover, and enjoy your favorite music with AI-powered recommendations"
    />
    <meta name="author" content="Harmony Hub" />

    <!-- Favicon dinamico — aggiornato via JS in ThemeContext -->
    <link
      rel="icon"
      type="image/png"
      href="/icons/app_blu_scuro.png"
      id="app-favicon"
    />
    <link
      rel="apple-touch-icon"
      href="/icons/app_blu_scuro.png"
      id="app-touch-icon"
    />

    <!-- PWA / mobile -->
    <meta name="theme-color" content="#080d1e" id="meta-theme-color" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Harmony Hub" />

    <!-- Colori di default applicati subito — evita schermo bianco prima che React carichi -->
    <style>
      :root {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
        --primary: 217.2 91.2% 59.8%;
        --card: 222.2 84% 4.9%;
        --secondary: 217.2 32.6% 17.5%;
        --muted: 217.2 32.6% 17.5%;
        --muted-foreground: 215 20.2% 65.1%;
        --border: 217.2 32.6% 17.5%;
      }
      html, body, #root {
        background-color: hsl(222.2deg 84% 4.9%);
        color: hsl(210deg 40% 98%);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
